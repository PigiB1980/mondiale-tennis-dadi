<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giocatori</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0b1d2a;
      color: white;
    }

    header {
      background: #132f4c;
      padding: 25px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .player-card {
      display: flex;
      background: #132f4c;
      border-radius: 12px;
      overflow: hidden;
      width: 300px;
      height: 150px;
    }

    .player-img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      background: #0f253a;
    }

    .player-info {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 15px;
      flex: 1;
    }

    .name {
      font-size: 18px;
      text-transform: lowercase;
    }

    .surname {
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .flag {
      width: 40px;
      height: auto;
      background: #0f253a;
    }

  </style>
</head>
<body>

  <header>
    🎾 Giocatori
  </header>

  <div class="container">

    <!-- 44 box generici con immagine placeholder -->
    "+Array.from({length:44}, (_,i)=>`<div class="player-card">
      <div class="player-img"></div>
      <div class="player-info">
        <div class="name">nome</div>
        <div class="surname">COGNOME</div>
        <img src="https://flagcdn.com/w40/xx.png" class="flag">
      </div>
    </div>`).join('\n')+"

  </div>

</body>
</html>
