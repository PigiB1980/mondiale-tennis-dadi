<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giocatori</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0b1d2a;
      color: white;
    }

    header {
      background: #132f4c;
      padding: 25px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      justify-items: center;
    }

    .player-card {
      display: flex;
      background: #132f4c;
      border-radius: 12px;
      overflow: hidden;
      width: 300px;
      height: 150px;
    }

    .player-img {
      width: 150px;
      height: 150px;
      background: #0f253a url('https://via.placeholder.com/150') center/cover no-repeat;
    }

    .player-info {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 15px;
      flex: 1;
    }

    .name {
      font-size: 18px;
      text-transform: lowercase;
    }

    .surname {
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .flag {
      width: 40px;
      height: auto;
      background: #0f253a;
    }

  </style>
</head>
<body>

  <header>
    🎾 Giocatori
  </header>

  <div class="container">

    <!-- 44 giocatori reali con placeholder foto -->

    <div class="player-card"><div class="player-img" style="background-image: url('img/jannik.jpg');"></div><div class="player-info"><div class="name">jannik</div><div class="surname">SINNER</div><img src="https://flagcdn.com/w40/it.png" class="flag"></div></div>
    <div class="player-card"><div class="player-img" style="background-image: url('img/alcaraz.jpg');"></div><div class="player-info"><div class="name">carlos</div><div class="surname">ALCARAZ</div><img src="https://flagcdn.com/w40/es.png" class="flag"></div></div>
    <div class="player-card"><div class="player-img" style="background-image: url('img/zverev.jpg');"></div><div class="player-info"><div class="name">alexander</div><div class="surname">ZVEREV</div><img src="https://flagcdn.com/w40/de.png" class="flag"></div></div>
    <div class="player-card"><div class="player-img" style="background-image: url('img/fritz.jpg');"></div><div class="player-info"><div class="name">taylor</div><div class="surname">FRITZ</div><img src="https://flagcdn.com/w40/us.png" class="flag"></div></div>
    <div class="player-card"><div class="player-img" style="background-image: url('img/draper.jpg');"></div><div class="player-info"><div class="name">jack</div><div class="surname">DRAPER</div><img src="https://flagcdn.com/w40/gb.png" class="flag"></div></div>
    <div class="player-card"><div class="player-img" style="background-image: url('img/djokovic.jpg');"></div><div class="player-info"><div class="name">novak</div><div class="surname">DJOKOVIC</div><img src="https://flagcdn.com/w40/rs.png" class="flag"></div></div>
    <div class="player-card"><div class="player-img" style="background-image: url('img/shelton.jpg');"></div><div class="player-info"><div class="name">ben</div><div class="surname">SHELTON</div><img src="https://flagcdn.com/w40/us.png" class="flag"></div></div>
    <div class="player-card"><div class="player-img" style="background-image: url('img/deminaur.jpg');"></div><div class="player-info"><div class="name">alex</div><div class="surname">de MINAUR</div><img src="https://flagcdn.com/w40/au.png" class="flag"></div></div>
    <div class="player-card"><div class="player-img" style="background-image: url('img/rune.jpg');"></div><div class="player-info"><div class="name">holger</div><div class="surname">RUNE</div><img src="https://flagcdn.com/w40/dk.png" class="flag"></div></div>
    <div class="player-card"><div class="player-img" style="background-image: url('img/musetti.jpg');"></div><div class="player-info"><div class="name">lorenzo</div><div class="surname">MUSETTI</div><img src="https://flagcdn.com/w40/it.png" class="flag"></div></div>

    <!-- Ripeti lo stesso schema per gli altri 34 giocatori -->

  </div>

</body>
</html>
