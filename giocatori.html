  <title>Giocatori</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0b1d2a;

    }

    header {
      background: #132f4c;
      padding: 25px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .player-card {
      display: flex;
      background: #132f4c;
      border-radius: 12px;
      overflow: hidden;
      width: 220px;
      height: 150px;
      flex-shrink: 0;
    }

    .player-img {
      width: 100px;
      height: 100%;
      object-fit: cover;
      background: #0f253a;
    }

    .player-info {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 10px;
      flex: 1;
    }

    .name {
      font-size: 16px;
      text-transform: lowercase;
    }

    .surname {
      font-size: 20px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .flag {
      width: 30px;
      height: auto;
      background: #0f253a;
    }

  </style>
</head>
