<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classifica Tennis</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0b1d2a;
    color: white;
  }

  header {
    background: #132f4c;
    padding: 20px;
    text-align: center;
    font-size: 40px;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 2px 2px 4px #0000FF;
  }

  .table-container {
    overflow-x: auto;
    padding: 20px;
  }

  table {
    border-collapse: collapse;
    min-width: 1500px;
    width: 100%;
  }

  th, td {
    border: 2px solid #1c4d73;
    padding: 6px 8px;
    text-align: center;
    white-space: nowrap;
    font-size: 14px;
  }

  th {
    background: #132f4c;
    color: #FFD700;
    font-size: 16px;
  }

  td.totale {
    font-weight: bold;
    font-size: 16px;
    background: #1c4d73;
  }

  td.separator {
    width: 5px;
    background: #0b1d2a;
    border: none;
  }

  td.player {
    text-align: left;
    padding-left: 10px;
  }

  tr:nth-child(even) td {
    background: rgba(255,255,255,0.05);
  }

  img.flag {
    width: 20px;
    height: 14px;
    vertical-align: middle;
    margin-right: 6px;
  }

</style>
</head>
<body>

<header>CLASSIFICA TENNIS</header>

<div class="table-container">
  <table id="classifica">
    <thead>
      <tr>
        <th>POS</th>
        <th>GIOCATORE</th>
        <th>TOTALE</th>
        <th class="separator"></th>
        <!-- colonne settimane generate da JS -->
      </tr>
    </thead>
    <tbody>
      <!-- righe giocatori generate da JS -->
    </tbody>
  </table>
</div>

<script>
// numero totale di settimane
const TOTAL_WEEKS = 28;

// mappa bandiere (in futuro completa con tutti i giocatori)
const bandiere = {
  "Jannik Sinner": "it",
  "Carlos Alcaraz": "es",
  "Prova Prova": "fr",
  "Pippo Pluto": "us"
};

// crea intestazioni settimane
const theadRow = document.querySelector("#classifica thead tr");
for (let i=1; i<=TOTAL_WEEKS; i++) {
  const th = document.createElement("th");
  th.textContent = `SET ${i}`;
  theadRow.appendChild(th);
}

// carica tutti i JSON disponibili
const tabella = document.querySelector("#classifica tbody");
const giocatori = {};

async function loadAllWeeks() {
  for (let i=1; i<=TOTAL_WEEKS; i++) {
    try {
      const r = await fetch(`week${i}.json`);
      if (!r.ok) continue; // salta se il file non esiste
      const data = await r.json();
      const punteggi = data.punteggi || {};
      for (let nome in punteggi) {
        if (!giocatori[nome]) {
          giocatori[nome] = { totale: 0, settimane: Array(TOTAL_WEEKS).fill(0) };
        }
        giocatori[nome].settimane[i-1] = punteggi[nome];
        giocatori[nome].totale += punteggi[nome];
      }
    } catch(e) {
      console.warn(`week${i}.json non disponibile`);
    }
  }

  renderTable();
}

function renderTable() {
  // ordina per totale
  const ordinati = Object.entries(giocatori).sort((a,b)=>b[1].totale - a[1].totale);

  tabella.innerHTML = "";
  ordinati.forEach(([nome, g], idx) => {
    const flag = bandiere[nome] ? `<img class="flag" src="flags/${bandiere[nome]}.png" alt="${bandiere[nome]}">` : "";
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${idx+1}</td>
      <td class="player">${flag}${nome}</td>
      <td class="totale">${g.totale}</td>
      <td class="separator"></td>
      ${g.settimane.map(p => `<td>${p}</td>`).join('')}
    `;
    tabella.appendChild(row);
  });
}

// avvia caricamento
loadAllWeeks();

</script>
</body>
</html>
