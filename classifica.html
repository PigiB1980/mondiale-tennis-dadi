<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classifica Tennis</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0b1d2a;
    color: white;
  }

  header {
    background: #132f4c;
    padding: 20px;
    text-align: center;
    font-size: 40px;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 2px 2px 4px #0000FF;
  }

  .table-container {
    overflow-x: auto;
    padding: 20px;
  }

  table {
    border-collapse: collapse;
    min-width: 1200px; /* forza scroll */
    width: 100%;
  }

  th, td {
    border: 2px solid #1c4d73;
    padding: 8px 12px;
    text-align: center;
    white-space: nowrap;
    font-size: 16px;
  }

  th {
    background: #132f4c;
    color: #FFD700;
    font-size: 16px; /* leggermente più piccolo per le settimane */
  }

  td.totale {
    font-weight: bold;
    font-size: 18px;
    background: #1c4d73;
  }

  td.giocatore {
    text-align: left;
    padding-left: 10px;
    min-width: 200px;
  }

  td.giocatore img {
    vertical-align: middle;
    width: 24px;
    height: 16px;
    margin-right: 5px;
  }

  td.separator, th.separator {
    width: 6px;
    background: #FFD700;
    padding: 0;
    border: none;
  }

  tr:nth-child(even) td {
    background: rgba(255,255,255,0.05);
  }
</style>
</head>
<body>

<header>CLASSIFICA TENNIS</header>

<div class="table-container">
  <table id="classifica">
    <thead>
      <tr>
        <th>POS</th>
        <th>GIOCATORE</th>
        <th>TOTALE</th>
        <th class="separator"></th>
        <!-- colonne settimane generate da JS -->
      </tr>
    </thead>
    <tbody>
      <!-- righe giocatori generate da JS -->
    </tbody>
  </table>
</div>

<script>
const tabella = document.querySelector("#classifica tbody");
const theadRow = document.querySelector("#classifica thead tr");
const settimane = Array.from({length:28}, (_,i)=>i+1);

// crea intestazioni settimane
settimane.forEach(n => {
    const th = document.createElement("th");
    th.textContent = `SET ${n}`;
    theadRow.appendChild(th);
});

// elenco bandiere per giocatori
const bandiere = {
  "Jannik Sinner": "it",
  "Carlos Alcaraz": "es",
  "Prova Prova": "fr",
  "Pippo Pluto": "us"
};

// caricamento dati dal JSON
fetch('week1.json')
  .then(r => r.json())
  .then(data => {
    const giocatori = {};
    const punteggi = data.punteggi || {};

    for (let nome in punteggi) {
      giocatori[nome] = {
        totale: punteggi[nome],
        settimane: Array(28).fill(0)
      };
      giocatori[nome].settimane[0] = punteggi[nome]; // settimana 1
    }

    // ordina per totale
    const ordinati = Object.entries(giocatori)
      .sort((a,b)=>b[1].totale - a[1].totale);

    // crea righe tabella
    ordinati.forEach(([nome, g], idx) => {
      const row = document.createElement("tr");

      // crea HTML giocatore con bandiera
      const flag = bandiere[nome] ? `<img src="https://flagcdn.com/${bandiere[nome]}.svg" alt="${bandiere[nome]}">` : "";

      row.innerHTML = `
        <td>${idx+1}</td>
        <td class="giocatore">${flag}${nome}</td>
        <td class="totale">${g.totale}</td>
        <td class="separator"></td>
        ${g.settimane.map(p => `<td>${p}</td>`).join('')}
      `;

      tabella.appendChild(row);
    });

  })
  .catch(err => console.error('Errore caricamento JSON:', err));
</script>

</body>
</html>
