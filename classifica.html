<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classifica Tennis</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0b1d2a;
    color: white;
  }

  header {
    background: #132f4c;
    padding: 20px;
    text-align: center;
    font-size: 40px;
    font-weight: bold;
    color: #FFD700;
    text-shadow: 2px 2px 4px #0000FF;
  }

  .table-container {
    overflow-x: auto;
    padding: 20px;
  }

  table {
    border-collapse: collapse;
    min-width: 1200px; /* forza scroll */
    width: 100%;
  }

  th, td {
    border: 2px solid #1c4d73;
    padding: 4px 8px;
    text-align: center;
    white-space: nowrap;
    font-size: 14px;
  }

  th {
    background: #132f4c;
    color: #FFD700;
    font-size: 16px;
  }

  td.totale {
    font-weight: bold;
    font-size: 16px;
    background: #1c4d73;
  }

  td.separazione {
    width: 5px;
    padding: 0;
    background: #000;
  }

  td.giocatore {
    text-align: left;
    padding-left: 8px;
    width: 180px;
  }

  td img.flag {
    width: 16px;
    height: 12px;
    vertical-align: middle;
    margin-right: 5px;
  }

  tr:nth-child(even) td {
    background: rgba(255,255,255,0.05);
  }

</style>
</head>
<body>

<header>CLASSIFICA TENNIS</header>

<div class="table-container">
  <table id="classifica">
    <thead>
      <tr>
        <th>POS</th>
        <th>GIOCATORE</th>
        <th>TOTALE</th>
        <th></th> <!-- colonna separazione -->
        <!-- colonne settimane generate da JS -->
      </tr>
    </thead>
    <tbody>
      <!-- righe giocatori generate da JS -->
    </tbody>
  </table>
</div>

<script>
const tabella = document.querySelector("#classifica tbody");
const theadRow = document.querySelector("#classifica thead tr");
const settimane = Array.from({length:28}, (_,i)=>i+1);

// crea le intestazioni settimane
settimane.forEach(n => {
    const th = document.createElement("th");
    th.textContent = `SET ${n}`;
    theadRow.appendChild(th);
});

// mappa giocatori → codici bandiera ISO
const bandiere = {
  "Jannik Sinner": "it",
  "Carlos Alcaraz": "es",
  "Prova Prova": "us",
  "Pippo Pluto": "fr"
};

// funzione per caricare i JSON (week1, week2, ecc.)
const loadWeek = (week) => fetch(week)
  .then(r => r.json())
  .then(data => data.punteggi || {})
  .catch(err => {
    console.error('Errore caricamento JSON:', err);
    return {};
  });

// carica tutte le settimane
(async () => {
  const tuttiGiocatori = {};
  const totaleSettimane = 28;

  for (let i=1; i<=totaleSettimane; i++) {
    const weekFile = `week${i}.json`;
    const punteggi = await loadWeek(weekFile);

    // aggiorna tuttiGiocatori
    for (let nome in punteggi) {
      if (!tuttiGiocatori[nome]) {
        tuttiGiocatori[nome] = { totale: 0, settimane: Array(totaleSettimane).fill(0) };
      }
      tuttiGiocatori[nome].settimane[i-1] = punteggi[nome];
      tuttiGiocatori[nome].totale += punteggi[nome];
    }
  }

  // ordina per totale decrescente
  const ordinati = Object.entries(tuttiGiocatori)
    .sort((a,b) => b[1].totale - a[1].totale);

  // crea righe tabella
  ordinati.forEach(([nome, g], idx) => {
    const flag = bandiere[nome]
      ? `<img class="flag" src="https://flagcdn.com/16x12/${bandiere[nome].toLowerCase()}.png" alt="${bandiere[nome]}">`
      : "";
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${idx+1}</td>
      <td class="giocatore">${flag}${nome}</td>
      <td class="totale">${g.totale}</td>
      <td class="separazione"></td>
      ${g.settimane.map(p => `<td>${p}</td>`).join('')}
    `;
    tabella.appendChild(row);
  });

})();
</script>

</body>
</html>
