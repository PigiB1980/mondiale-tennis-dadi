<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classifica Mondiale Tennis</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #0b1d2a;
    color: white;
  }

  h1 {
    text-align: center;
    margin: 20px 0;
    color: #FFD700;
    text-shadow: 2px 2px 4px #0000FF;
  }

  .table-container {
    overflow-x: auto;
    margin: 20px;
  }

  table {
    border-collapse: collapse;
    width: max-content;
    min-width: 100%;
    background: #132f4c;
  }

  th, td {
    border: 1px solid #1c4d73;
    padding: 8px 12px;
    text-align: center;
    white-space: nowrap;
  }

  th {
    background: #1c4d73;
    font-weight: bold;
    color: #FFD700;
  }

  td.totale {
    font-weight: bold;
    color: #FF4500;
  }

  tr:nth-child(even) td {
    background: #0f2a3d;
  }

  tr:hover td {
    background: #1c4d73;
  }
</style>
</head>
<body>

<h1>CLASSIFICA MONDIALE TENNIS</h1>

<div class="table-container">
  <table id="classifica">
    <thead>
      <tr>
        <th>POS</th>
        <th>GIOCATORE</th>
        <th>TOTALE</th>
        <!-- 28 settimane -->
        ${Array.from({length:28}, (_,i)=>`<th>W${i+1}</th>`).join('')}
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const tabella = document.querySelector("#classifica tbody");
const settimane = Array.from({length:28}, (_,i)=>`week${i+1}`);
const giocatori = {};

// Carica tutti i JSON settimanali
Promise.all(settimane.map((w,i) => 
    fetch(`week${i+1}.json`)
      .then(r => r.ok ? r.json() : {})   // ignora JSON mancanti
      .catch(()=>({}))
)).then(tutti => {
    // Somma i punteggi per ogni giocatore
    tutti.forEach((data,i) => {
        const puntiSettimana = data.punteggi || {};
        for (let nome in puntiSettimana) {
            if (!giocatori[nome]) {
                giocatori[nome] = { totale: 0 };
                settimane.forEach(s => giocatori[nome][s] = 0);
            }
            giocatori[nome][`week${i+1}`] = puntiSettimana[nome];
            giocatori[nome].totale += puntiSettimana[nome];
        }
    });

    // Ordina per totale decrescente
    const ordinati = Object.entries(giocatori).sort((a,b)=>b[1].totale - a[1].totale);

    // Crea le righe della tabella
    ordinati.forEach(([nome, g], idx) => {
        const row = document.createElement("tr");
        const settimaneHTML = settimane.map(s => `<td>${g[s] || ''}</td>`).join('');
        row.innerHTML = `
            <td>${idx+1}</td>
            <td>${nome}</td>
            <td class="totale">${g.totale}</td>
            ${settimaneHTML}
        `;
        tabella.appendChild(row);
    });
});
</script>

</body>
</html>
