<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classifica Mondiale Tennis</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #0b1d2a;
  color: white;
  margin: 0;
  padding: 0;
}

.table-container {
  overflow-x: auto;
  padding: 20px;
}

table {
  border-collapse: collapse;
  width: 100%;
  min-width: 1600px; /* abbastanza per 28 colonne */
}

th, td {
  border: 2px solid #1c4d73;
  padding: 8px 12px;
  text-align: center;
  white-space: nowrap;
  font-size: 16px;
}

th {
  background: #132f4c;
  color: #FFD700;
  font-size: 18px;
}

td.totale {
  font-weight: bold;
  background: #1c4d73;
}

/* righe alternate */
tr:nth-child(even) td {
  background: rgba(255,255,255,0.05);
}

/* STICKY PRIME 3 COLONNE */
th:nth-child(1), td:nth-child(1) {
  position: sticky;
  left: 0;
  background: #132f4c;
  z-index: 4;
}

th:nth-child(2), td:nth-child(2) {
  position: sticky;
  left: 50px;
  background: #132f4c;
  z-index: 3;
}

th:nth-child(3), td:nth-child(3) {
  position: sticky;
  left: 300px;
  background: #132f4c;
  z-index: 3;
}

</style>
</head>
<body>

<h1 style="text-align:center; padding:20px;">CLASSIFICA MONDIALE TENNIS</h1>

<div class="table-container">
  <table id="classifica">
    <thead>
      <tr>
        <th>POS</th>
        <th>GIOCATORE</th>
        <th>TOTALE</th>
        <!-- 28 settimane -->
        ${Array.from({length:28}, (_,i)=>`<th>SETT. ${i+1}</th>`).join('')}
      </tr>
    </thead>
    <tbody>
      <!-- qui saranno inserite le righe via JS -->
    </tbody>
  </table>
</div>

<script>
const tabella = document.querySelector("#classifica tbody");

// dati d'esempio (poi li prenderai dai tuoi 28 json)
const giocatori = {
  "Carlos Alcaraz": { totale: 35, settimane: Array(28).fill(0) },
  "Jannik Sinner": { totale: 25, settimane: Array(28).fill(0) },
  "Novak Djokovic": { totale: 20, settimane: Array(28).fill(0) },
  "Rafael Nadal": { totale: 15, settimane: Array(28).fill(0) }
};

// riempiamo qualche settimana per demo
giocatori["Carlos Alcaraz"].settimane[0] = 35;
giocatori["Jannik Sinner"].settimane[0] = 25;

// ordiniamo per totale
const ordinati = Object.entries(giocatori)
  .sort((a,b) => b[1].totale - a[1].totale);

ordinati.forEach(([nome, g], index) => {
  const row = document.createElement("tr");
  row.innerHTML = `
    <td>${index+1}</td>
    <td>${nome}</td>
    <td class="totale">${g.totale}</td>
    ${g.settimane.map(p => `<td>${p}</td>`).join('')}
  `;
  tabella.appendChild(row);
});
</script>

</body>
</html>
