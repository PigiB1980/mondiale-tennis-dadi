<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 1 - Mondiale di Tennis</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0b1d2a;
      color: white;
    }

    header {
      background: #132f4c;
      padding: 25px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
    }

    .tournament {
      background: #132f4c;
      border-radius: 10px;
      padding: 20px;
      margin: 20px auto;
      width: 800px;
    }

    /* Titolo torneo con flexbox */
    .tournament-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .tournament-header h2 {
      flex: 1;
      text-align: center;
      font-size: 32px;
      color: red;
      text-shadow: 2px 2px 5px black;
      margin: 0;
    }

    .tournament-header img.logo-left {
      height: 40px;
    }

    .tournament-header img.logo-right {
      height: 60px;
    }

    .round-title {
      font-size: 22px;
      margin-top: 20px;
      margin-bottom: 10px;
      text-decoration: underline;
    }

    .match {
      display: grid;
      grid-template-columns: 50px minmax(400px, 1fr) 150px;
      padding: 8px 0;
      border-bottom: 4px solid #1c4d73;
      font-size: 18px;
    }

    .match div:nth-child(1) {
      border-right: 4px solid #1c4d73;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }

    .match div:nth-child(2) {
      border-right: 4px solid #1c4d73;
      font-size: 25px;
      padding-left: 30px;
      white-space: nowrap;
      overflow: hidden;
    }

    .match div:nth-child(3) {
      text-align: center;
      font-size: 25px;
      padding-left: 5px;
      white-space: nowrap;
    }

    .flag-small {
      width: 18px;
      vertical-align: middle;
      margin-right: 6px;
    }

  </style>
</head>
<body>

  <header>🎾 WEEK 1 🎾</header>

  <div id="tournaments-container"></div>

  <script>
    const logoATP250 = "img/atp 250.png";
    const logosSinistri = {
      "Brisbane": "img/01 - Brisbane.png",
      "Adelaide": "img/01 - Adelaide.png",
      "Auckland": "img/01 - Auckland.png",
      "Hongkong": "img/01 - Hong Kong.jpg"
    };

    const tournamentsContainer = document.getElementById("tournaments-container");

    fetch('week1.json')
      .then(response => response.json())
      .then(week1 => {

        function createTournamentHTML(name, data) {
          const tourDiv = document.createElement("div");
          tourDiv.classList.add("tournament");

          tourDiv.innerHTML = `
            <div class="tournament-header">
              <img src="${logoATP250}" alt="Logo ATP" class="logo-left">
              <h2>${name.toUpperCase()}</h2>
              <img src="${logosSinistri[name]}" alt="Logo torneo" class="logo-right">
            </div>

            <div class="round-title">Quarti di finale</div><div id="${name}-quarti"></div>
            <div class="round-title">Semifinali</div><div id="${name}-semi"></div>
            <div class="round-title">Finale</div><div id="${name}-finale"></div>
          `;

          tournamentsContainer.appendChild(tourDiv);

          createMatches(`${name}-quarti`, data.quarti);
          createMatches(`${name}-semi`, data.semi);
          createMatches(`${name}-finale`, data.finale);
        }

        function createMatches(containerId, matches) {
          const container = document.getElementById(containerId);
          matches.forEach((m, i) => {
            const matchDiv = document.createElement("div");
            matchDiv.classList.add("match");
            matchDiv.innerHTML = `
              <div>${i+1}</div>
              <div>
                ${m.f1 ? `<img src="https://flagcdn.com/w20/${m.f1}.png" class="flag-small">` : ""}${m.p1} 
                - 
                ${m.f2 ? `<img src="https://flagcdn.com/w20/${m.f2}.png" class="flag-small">` : ""}${m.p2}
              </div>
              <div>${m.score}</div>
            `;
            container.appendChild(matchDiv);
          });
        }

        for (let tournament in week1) {
          createTournamentHTML(tournament, week1[tournament]);
        }

      })
      .catch(err => console.error('Errore nel caricamento del JSON:', err));

  </script>

</body>
</html>
