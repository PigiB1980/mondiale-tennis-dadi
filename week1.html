<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 1 - Mondiale di Tennis</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0b1d2a;
      color: white;
    }

    /* Pulsante Home fisso */
    .home-button {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #ff0000;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 18px;
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .home-button:hover {
      background: #cc0000;
    }

    header {
  background: #132f4c;
  padding: 30px 20px;
  text-align: center;
  font-size: 60px;        /* più grande */
  font-weight: bold;
  color: #FFD700;         /* giallo */
  text-shadow: 2px 2px 4px #0000FF; /* ombra blu */
}

    .tournament {
      background: #132f4c;
      border-radius: 10px;
      padding: 20px;
      margin: 20px auto; /* centra orizzontalmente */
      width: 800px;
    }

    .tournament h2 {
  font-size: 40px;
  text-align: center;
  color: red; /* testo rosso */
  text-transform: uppercase;
  font-weight: bold;
  padding: 10px 20px;
  border-radius: 12px;
  background: linear-gradient(to right, #f9f9f9, #e0e0e0); /* sfondo sfumato chiaro */
  box-shadow: 2px 2px 8px rgba(0,0,0,0.4); /* ombra leggera */
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px; /* spazio tra i loghi e il testo */
}
.tournament h2 img {
  height: 50px; /* dimensione dei loghi */
}

    .round-title {
      font-size: 22px;
      margin-top: 20px;
      margin-bottom: 10px;
      text-decoration: underline;
    }

    .match {
      display: grid;
      grid-template-columns: 50px minmax(400px, 1fr) 150px;
      padding: 8px 0;
      border-bottom: 4px solid #1c4d73;
      font-size: 18px;
    }

    .match div:nth-child(1) {
      border-right: 4px solid #1c4d73;
      text-align: center;
      font-weight: bold;
      font-size: 20px;
    }

    .match div:nth-child(2) {
      border-right: 4px solid #1c4d73;
      font-size: 25px;
      padding-left: 30px;
      white-space: nowrap;
      overflow: hidden;
    }

    .match div:nth-child(3) {
      text-align: center;
      font-size: 25px;
      padding-left: 5px;
      white-space: nowrap;
    }

    .flag-small {
      width: 18px;
      vertical-align: middle;
      margin-right: 6px;
    }

  </style>
</head>
<body>

  <!-- Pulsante Home -->
  <button class="home-button" onclick="location.href='index.html'">🏠 Home</button>

  <header>🎾 SETTIMANA 1 🎾</header>

  <div id="tournaments-container"></div>

  <script>
    const logoATP250 = 'img/atp 250.png';
    const logosSinistri = {
      "brisbane": "img/01 - Brisbane.png",
      "adelaide": "img/01 - Adelaide.png",
      "auckland": "img/01 - Auckland.png",
      "hongkong": "img/01 - Hong Kong.jpg"
    };

    const tournamentsContainer = document.getElementById("tournaments-container");

    fetch('week1.json')
      .then(response => response.json())
      .then(week1 => {

        function createTournamentHTML(name, data) {
          const tourDiv = document.createElement("div");
          tourDiv.classList.add("tournament");

          tourDiv.innerHTML = `
            <h2>
              <img src="${logoATP250}" alt="Logo ATP 250">
              ${name.toUpperCase()}
              <img src="${logosSinistri[name]}" alt="Logo torneo">
            </h2>
            <div class="round-title">Quarti di finale</div><div id="${name}-quarti"></div>
            <div class="round-title">Semifinali</div><div id="${name}-semi"></div>
            <div class="round-title">Finale</div><div id="${name}-finale"></div>
          `;
          tournamentsContainer.appendChild(tourDiv);

          createMatches(`${name}-quarti`, data.quarti);
          createMatches(`${name}-semi`, data.semi);
          createMatches(`${name}-finale`, data.finale);
        }

        function createMatches(containerId, matches) {
          const container = document.getElementById(containerId);
          matches.forEach((m, i) => {
            const matchDiv = document.createElement("div");
            matchDiv.classList.add("match");
            matchDiv.innerHTML = `
              <div>${i+1}</div>
              <div>
                ${m.f1 ? `<img src="https://flagcdn.com/w20/${m.f1}.png" class="flag-small">` : ""}${m.p1} 
                - 
                ${m.f2 ? `<img src="https://flagcdn.com/w20/${m.f2}.png" class="flag-small">` : ""}${m.p2}
              </div>
              <div>${m.score}</div>
            `;
            container.appendChild(matchDiv);
          });
        }

        for (let tournament in week1) {
          createTournamentHTML(tournament, week1[tournament]);
        }

      })
      .catch(err => console.error('Errore nel caricamento del JSON:', err));
  </script>

</body>
</html>
