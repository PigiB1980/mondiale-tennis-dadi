<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Week 1</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0b1d2a;
      color: white;
    }

    header {
      background: #132f4c;
      padding: 25px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .tournament-title {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .round {
      margin-bottom: 25px;
      background: #132f4c;
      padding: 15px;
      border-radius: 10px;
    }

    .round-title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .match {
      display: grid;
      grid-template-columns: 40px 1fr 120px;
      padding: 6px 0;
      border-bottom: 1px solid #0b1d2a;
    }

    .match:last-child {
      border-bottom: none;
    }

    .match-number {
      font-weight: bold;
    }

    .match-players {
      text-align: left;
    }

    .match-score {
      text-align: right;
    }

  </style>
</head>

<body>

  <header>
    Week 1 – Brisbane (ATP 250)
  </header>

  <div class="container">

    <div class="tournament-title">Brisbane</div>

    <div id="brisbane"></div>

  </div>

  <script>
    fetch('brisbane.json')
      .then(response => response.json())
      .then(data => {

        const container = document.getElementById('brisbane');

        function createRound(title, matches) {
          let html = `<div class="round">
                        <div class="round-title">${title}</div>`;

          matches.forEach((m, i) => {
            html += `
              <div class="match">
                <div class="match-number">${i+1}</div>
                <div class="match-players">${m.p1} - ${m.p2}</div>
                <div class="match-score">${m.score}</div>
              </div>
            `;
          });

          html += `</div>`;
          return html;
        }

        container.innerHTML =
          createRound("Quarti di finale", data.quarti) +
          createRound("Semifinali", data.semi) +
          createRound("Finale", data.finale);

      });
  </script>

</body>
</html>
