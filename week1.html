<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Week 1</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0b1d2a;
      color: white;
    }

    header {
      background: #132f4c;
      padding: 25px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .tournament {
      margin-bottom: 50px;
    }

    .tournament-title {
      font-size: 24px;
      margin-bottom: 15px;
    }

    .round {
      margin-bottom: 20px;
      background: #132f4c;
      padding: 15px;
      border-radius: 10px;
    }

    .round-title {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .match {
      display: grid;
      grid-template-columns: 50px 1fr 140px;
      padding: 8px 0;
      border-bottom: 1px solid #0b1d2a;
    }

    .match:first-child {
      border-top: 2px solid #1c4d73;
    }

    .match div {
      padding: 0 10px;
    }

    .match div:nth-child(1) {
      border-right: 2px solid #1c4d73;
      text-align: center;
      font-weight: bold;
    }

    .match div:nth-child(2) {
      border-right: 2px solid #1c4d73;
    }

    .match div:nth-child(3) {
      text-align: right;
    }

    .match:last-child {
      border-bottom: none;
    }

  </style>
</head>

<body>

<header>
  Week 1 – ATP 250
</header>

<div class="container">

  <div id="brisbane"></div>
  <div id="hongkong"></div>
  <div id="adelaide"></div>
  <div id="auckland"></div>

</div>

<script>

fetch('week1.json')
.then(r => r.json())
.then(data => {

  function createTournament(name, data) {

    function round(title, matches) {
      let html = `<div class="round"><div class="round-title">${title}</div>`;
      
      matches.forEach((m,i) => {
        html += `<div class="match">
          <div>${i+1}</div>
          <div>${m.p1} - ${m.p2}</div>
          <div>${m.score}</div>
        </div>`;
      });

      html += `</div>`;
      return html;
    }

    return `
      <div class="tournament">
        <div class="tournament-title">${name}</div>
        ${round("Quarti di finale", data.quarti)}
        ${round("Semifinali", data.semi)}
        ${round("Finale", data.finale)}
      </div>
    `;
  }

  document.getElementById('brisbane').innerHTML = createTournament("Brisbane", data.brisbane);
  document.getElementById('hongkong').innerHTML = createTournament("Hong Kong", data.hongkong);
  document.getElementById('adelaide').innerHTML = createTournament("Adelaide", data.adelaide);
  document.getElementById('auckland').innerHTML = createTournament("Auckland", data.auckland);

});

</script>

</body>
</html>
